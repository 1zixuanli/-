<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="railLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="railGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24"/>
    </filter>
  </defs>
  <rect width="480" height="640" fill="url(#railGlow)"/>
  <g opacity="0.85">
    <path d="M-20 520 Q120 480 240 440 T520 360" stroke="url(#railLine)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-20 560 Q140 500 280 460 T520 380" stroke="url(#railLine)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M40 200 L200 200 L220 240 L60 240 Z" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.35)" stroke-width="1"/>
    <path d="M260 160 L400 160 L420 200 L280 200 Z" fill="rgba(129,140,248,0.1)" stroke="rgba(129,140,248,0.3)" stroke-width="1"/>
    <circle cx="380" cy="120" r="48" fill="rgba(14,165,233,0.12)" filter="url(#blur)"/>
    <circle cx="120" cy="320" r="72" fill="rgba(99,102,241,0.1)" filter="url(#blur)"/>
  </g>
  <g stroke="rgba(148,163,184,0.25)" stroke-width="1">
    <line x1="60" y1="100" x2="420" y2="100"/>
    <line x1="60" y1="130" x2="360" y2="130"/>
  </g>
